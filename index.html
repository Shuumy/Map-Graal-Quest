<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Carta Arthuriana — carte interactive des lieux majeurs des légendes arthuriennes médiévales.">
  <title>Carta Arthuriana — Carte des Légendes Arthuriennes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <aside id="sidebar" aria-label="Légende et détails des lieux">
    <button id="close-btn" type="button" title="Fermer" aria-label="Fermer la légende">✕</button>
    <header id="sidebar-header">
      <div id="header-ornament" aria-hidden="true">⚜ ✦ ⚜</div>
      <h1>Carta Arthuriana</h1>
      <div class="subtitle">Cartographie des légendes — IXe–XVe siècles</div>
    </header>
    <section id="info-panel" aria-live="polite">
      <div class="placeholder">Cliquez sur un lieu pour afficher les sources et personnages associés.</div>
    </section>
    <section class="sidebar-section" aria-labelledby="filter-title">
      <div id="filter-title" class="sidebar-section-title">Filtrer par thème</div>
      <div id="filter-grid"></div>
    </section>
    <nav id="legend-scroll" aria-label="Index des lieux">
      <div class="sidebar-section-title">Index des lieux</div>
      <div id="legend-content"></div>
    </nav>
  </aside>

  <main id="map-wrap">
    <div id="map-badge" aria-hidden="true">
      <h2>CARTA ARTHURIANA</h2>
      <p>Sources primaires médiévales · IXe–XVe s.</p>
    </div>
    <button id="legend-toggle-btn" type="button" title="Afficher la légende" aria-label="Afficher ou masquer la légende" aria-expanded="false">☰</button>
    <div id="map" role="application" aria-label="Carte interactive des lieux arthuriens"></div>
  </main>

  <noscript>Cette carte interactive nécessite JavaScript.</noscript>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="./js/base-data-00.js"></script>
  <script src="./js/base-data-01.js"></script>
  <script src="./js/base-data-rest.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/merge-data.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
